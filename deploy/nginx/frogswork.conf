# FrogsWork File Storage — nginx site (deployed to /etc/nginx/sites-available/frogswork)
# Installed by scripts/install/02-deploy-app.sh (M1+).

upstream frogswork_api {
    server unix:/run/frogswork/api.sock;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name frogswork frogswork.local;

    root /opt/frogswork/dashboard/dist;
    index index.html;

    location /api/ {
        proxy_pass http://frogswork_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
