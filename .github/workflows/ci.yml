name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Backend tests
        run: |
          cd backend
          python -m pip install -e ".[dev]"
          pytest -q

      - name: Dashboard build
        run: |
          cd dashboard
          npm ci
          npm run build

      - name: Helper build
        run: |
          cd helper/FrogsWork.Helper
          dotnet build -c Release

  release-artifact:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build release tarball
        run: bash scripts/release/build-tarball.sh dist

      - uses: actions/upload-artifact@v4
        with:
          name: frogswork-release
          path: |
            dist/frogswork-v*.tar.gz
            dist/frogswork-v*.tar.gz.sha256
