# FrogsWork File Storage — Samba base configuration
# Unified share: all user homes and team folders under /data/frogswork (ACL-controlled).

[global]
   workgroup = WORKGROUP
   netbios name = FROGSWORK
   server string = FrogsWork File Storage
   security = user
   map acl inherit = yes
   vfs objects = acl_xattr

[frogswork]
   comment = FrogsWork File Storage
   path = /data/frogswork
   browseable = yes
   read only = no
   valid users = @frogswork-users
   vfs objects = acl_xattr
   hide unreadable = yes

[homes]
   browseable = no
