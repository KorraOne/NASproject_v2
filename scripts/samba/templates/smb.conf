# FrogsWork File Storage — Samba base configuration
# Dynamic share fragments are written to shares.d/ by the API (M4+).

[global]
   workgroup = WORKGROUP
   netbios name = FROGSWORK
   server string = FrogsWork File Storage
   security = user
   map acl inherit = yes
   vfs objects = acl_xattr
   # Per-share fragments listed in 00-manifest.conf (Samba does not expand globs here).
   include = /etc/samba/shares.d/00-manifest.conf

[homes]
   browseable = no
   read only = no
